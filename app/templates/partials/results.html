<div class="results__header">
  <h2 class="results__title">5 places to visit in {{ location }}</h2>
  {% if places and places[0].is_generic %}
    <span class="badge badge--warning">General suggestions — add an API key for tailored results</span>
  {% endif %}
</div>
<div class="grid grid--places">
  {% for place in places %}
    <article class="place-card">
      <div class="place-card__index">{{ loop.index }}</div>
      <h3 class="place-card__name">{{ place.name }}</h3>
      <p class="place-card__desc">{{ place.description }}</p>
    </article>
  {% endfor %}
</div>
