{% extends "base.html" %}
{% block heading %}Search{% endblock %}
{% block content %}
  <section class="hero">
    <span class="hero__eyebrow">WanderFive</span>
    <h1 class="hero__title">Where to next?</h1>
    <p class="hero__subtitle">Type any city, town, or landmark — get 5 places worth visiting, instantly.</p>

    <form class="searchbar" hx-post="/search" hx-target="#results" hx-swap="innerHTML" hx-indicator="#search-indicator">
      <input
        class="searchbar__input"
        type="text"
        name="location"
        placeholder="e.g. Kyoto, Lisbon, your hometown…"
        autocomplete="off"
        autofocus
        required
      >
      <button class="btn btn--primary searchbar__submit" type="submit">
        <span class="btn__label">Find places</span>
        <span id="search-indicator" class="htmx-indicator"><span class="spinner spinner--light"></span></span>
      </button>
    </form>
  </section>

  <section id="results" class="results"></section>
{% endblock %}
